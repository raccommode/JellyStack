manifestVersion: 1.1
id: jellystack-dozzle
category: developer
name: Dozzle (JellyStack)
version: "v8.8.2"
tagline: Real-time log viewer for Docker containers.
description: >-
  Dozzle is a small, lightweight, web-based application for monitoring
  Docker container logs in real time. It doesn't store log history and
  doesn't require additional dependencies, making it a perfect companion
  for your Docker-based homelab.

  In the JellyStack ecosystem, Dozzle gives you a single pane of glass
  to observe what every service is doing: Jellyfin transcoding, Sonarr
  importing, qBittorrent downloading, Gluetun VPN status, and everything
  else. No more SSH-ing into the host to tail logs one container at a
  time.

  Features include real-time log streaming, full-text search, filtering
  by container, multi-container stacking, dark mode, and zero
  configuration. Access only containers on the same Docker daemon; the
  socket is mounted read-only for safety.
releaseNotes: Initial JellyStack release.
