manifestVersion: 1.1
id: jellystack-janitorr
category: automation
name: Janitorr (JellyStack)
version: "latest"
tagline: Automatically clean up old media from your library.
description: >-
  Janitorr is a media cleanup tool that automatically deletes old movies
  and TV shows from your library based on age, watch status, and disk
  space thresholds. It integrates with Sonarr, Radarr, Jellyfin, and
  Jellyseerr to make sure deletions are safe and reversible.

  Within the JellyStack ecosystem, Janitorr solves one of the hardest
  problems of self-hosted media: keeping storage under control as your
  library grows. Configure rules like "delete movies watched by all
  users more than 30 days ago" or "delete unwatched shows older than
  90 days when disk is above 80 percent" and let Janitorr do the rest.

  Features include age-based and disk-usage-based cleanup policies, tag
  filtering, dry-run mode, integration with Jellyseerr to mark content
  as eligible for re-request, Sonarr/Radarr tag-based exclusion, and a
  web UI for configuration and monitoring.
releaseNotes: Initial JellyStack release.
developer: Schaka
website: https://github.com/Schaka/janitorr
dependencies:
  - jellystack-jellyfin
repo: https://github.com/Schaka/janitorr
support: https://github.com/raccommode/JellyStack/issues
port: 8978
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - STORAGE_MEDIA
submitter: raccommode
submission: https://github.com/raccommode/JellyStack
