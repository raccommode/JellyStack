manifestVersion: 1.1
id: jellystack-prowlarr
category: media
name: Prowlarr (JellyStack)
version: "1.30.2"
tagline: Indexer manager/proxy for the *arr suite.
description: >-
  Prowlarr is an indexer manager/proxy built on the popular arr .NET/ReactJS base stack. It
  integrates seamlessly with Sonarr, Radarr, Lidarr, and Readarr, providing a single point to
  manage trackers and Usenet indexers.


  The JellyStack Panel wires Prowlarr against every installed *arr app on first run, so you
  never have to copy-paste an API key between tabs again.
releaseNotes: Initial JellyStack release.
developer: Team Prowlarr
