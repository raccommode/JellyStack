manifestVersion: 1.1
id: jellystack-panel
category: media
name: JellyStack Panel
version: "0.1.0"
tagline: Unified dashboard and auto-configurator for the JellyStack media suite.
description: >-
  JellyStack Panel is the central hub for your JellyStack installation. It detects every
  JellyStack app you have installed (Jellyfin, Sonarr, Radarr, Prowlarr, qBittorrent, and more),
  wires them together automatically through their REST APIs, and exposes them through a single
  unified UI — no terminal, no `.env` editing, no hunting for API keys.


  ✨ FEATURES


  - Auto-discovers installed JellyStack apps via Umbrel's dependency mechanism.

  - Setup wizard that connects Prowlarr → the *arr suite → download clients in a few clicks.

  - Unified iframe navigation: access every app without leaving the panel.

  - Centralized settings: edit Gluetun/VPN credentials, Prowlarr indexers, media paths, and
    Jellyfin users without opening each app individually.

  - Internationalized — ships with English and French, easily extensible.


  🔧 SETUP


  1. Install JellyStack Panel first.

  2. Install the JellyStack apps you want (Jellyfin, Sonarr, Radarr, Prowlarr, qBittorrent, …).

  3. Open the Panel and follow the welcome wizard — it will do the wiring for you.
releaseNotes: >-
  Initial release. This is an early development version: features and behavior may change
  between updates while we stabilize the auto-configuration flows.
