version: "3.7"

# JellyStack Panel — Next.js dashboard that auto-configures the JellyStack apps.

services:
  app_proxy:
    environment:
      APP_HOST: jellystack-panel_server_1
      APP_PORT: 5000
      PROXY_AUTH_ADD: "true"

  server:
    # Replace with the pinned digest once the image is published:
    #   ghcr.io/raccommode/jellystack-panel:0.1.0@sha256:...
    image: ghcr.io/raccommode/jellystack-panel:0.1.0
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOSTNAME=0.0.0.0
      # Let the panel read each app's config.xml / API keys from read-only bind mount.
      - UMBREL_APP_DATA_ROOT=/umbrel-app-data
      # Where JellyStack stores media and downloads (see shared/env.example).
      - JELLYSTACK_ROOT=${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}
      - TZ=${TZ:-UTC}
    volumes:
      # Panel's own persistent state (user preferences, wizard progress).
      - ${APP_DATA_DIR}/data/config:/app/data
      # Read-only view of every app's data directory so the panel can
      # auto-extract API keys from Sonarr/Radarr/Prowlarr config.xml etc.
      - ${UMBREL_ROOT}/app-data:/umbrel-app-data:ro
      # Read-only view of the shared JellyStack media/downloads tree so the
      # panel can show disk usage and verify paths.
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}:/data:ro
