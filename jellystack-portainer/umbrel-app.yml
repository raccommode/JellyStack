manifestVersion: 1.1
id: jellystack-portainer
category: developer
name: Portainer CE (JellyStack)
version: "2.21.5"
tagline: Universal container management UI for Docker.
description: >-
  Portainer Community Edition is a lightweight service delivery platform
  for containerized applications. It gives you a powerful web interface
  to manage Docker containers, images, networks, volumes, and stacks
  with no command-line knowledge required.

  Within the JellyStack ecosystem, Portainer is the power user's
  companion. While Umbrel handles app installation and lifecycle, there
  are times when you need raw container control: inspecting a hung
  process, rolling back an image, editing a compose file, or just
  understanding what is running. Portainer makes all of that trivial.

  Features include real-time container stats, web-based terminal into
  running containers, image registry management, Docker Compose stack
  editing, volume and network management, role-based access control,
  and support for Docker Swarm. A read-only Docker socket mount would
  be safer if you only need monitoring; the write-enabled mount used
  here enables full management.
releaseNotes: Initial JellyStack release.
