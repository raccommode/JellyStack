manifestVersion: 1.1
id: jellystack-unpackerr
category: automation
name: Unpackerr (JellyStack)
version: "release-0.14.5"
tagline: Automatically extract archives for the *arr suite.
description: >-
  Unpackerr is a small Go daemon that extracts downloads for Sonarr,
  Radarr, Lidarr, Readarr, and Whisparr. It runs in the background,
  watches your *arr applications for completed downloads that contain
  archives, and extracts them so the *arr app can import the files.

  Within JellyStack, Unpackerr closes the loop between your torrent and
  Usenet clients and the *arr import process. Many scene releases still
  arrive as RAR archives, and without automatic extraction they would
  sit in the download folder unimported. Unpackerr makes the whole
  pipeline fully hands-off.

  Features include support for RAR, 7Zip, Zip, Tar, GZip, BZip2, and
  more; configurable retry logic; automatic cleanup of extracted files
  once imported; and optional webhook/notification integration. A
  minimal built-in web UI is available for status at a glance.
releaseNotes: Initial JellyStack release.
developer: hotio / davidnewhall
website: https://unpackerr.zip
dependencies: []
repo: https://github.com/Unpackerr/unpackerr
support: https://github.com/raccommode/JellyStack/issues
port: 5656
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - STORAGE_DOWNLOADS
submitter: raccommode
submission: https://github.com/raccommode/JellyStack
