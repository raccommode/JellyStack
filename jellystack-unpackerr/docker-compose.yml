version: "3.7"

services:
  server:
    image: ghcr.io/hotio/unpackerr:release-0.14.5
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - UN_WEBSERVER_PORT=5656
      - UN_WEBSERVER_LISTEN_ADDR=0.0.0.0
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}/downloads:/downloads
