manifestVersion: 1.1
id: jellystack-autobrr
category: automation
name: autobrr (JellyStack)
version: "v1.63.0"
tagline: Modern IRC-based release automation for torrent trackers.
description: >-
  autobrr is a modern, web-based torrent autodl replacement that watches
  tracker IRC announce channels and pushes matching releases directly
  to your download client the moment they are announced, giving you a
  critical edge on private trackers where speed matters.

  In the JellyStack ecosystem, autobrr pairs beautifully with
  qBittorrent, Sonarr, and Radarr. Set up filters once in a friendly
  web UI, connect your trackers, and let autobrr grab new releases
  before anyone else. It can also push directly to *arr applications
  or to download clients.

  Features include a beautiful web UI, powerful filter rules (size,
  resolution, codec, tags, freeleech, etc.), support for dozens of
  trackers, integration with qBittorrent / Deluge / rTorrent / Transmission,
  *arr forwarding, notifications to Discord / Telegram / Notifiarr,
  and a robust IRC client with automatic reconnection.
