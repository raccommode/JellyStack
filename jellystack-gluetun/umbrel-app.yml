manifestVersion: 1.1
id: jellystack-gluetun
category: networking
name: Gluetun VPN (JellyStack)
version: "3.40.0"
tagline: VPN client container for Mullvad, ProtonVPN, PIA, and more — for routing torrent traffic.
description: >-
  Gluetun is a lightweight VPN client container that can carry other containers' network
  traffic through a secure tunnel. It supports WireGuard and OpenVPN across a wide range of
  providers: Mullvad, ProtonVPN, Private Internet Access, AirVPN, Surfshark, and others.


  🛠️ SETUP NOTES


  - Configure Mullvad (WireGuard) from the JellyStack Panel's *Settings → VPN* page — no
    terminal required. Alternatively, fill in the `VPN_*` variables in
    `shared/env.example`.

  - To route qBittorrent through Gluetun, add a `docker-compose.override.yml` in the
    qBittorrent app dir with `network_mode: "service:jellystack-gluetun_server_1"`. See
    `shared/docs/gluetun-setup.md`.


  ⚠️ This container needs the `NET_ADMIN` capability and `/dev/net/tun` access to set up the
  tunnel. umbrelOS grants these automatically for apps that request them.
