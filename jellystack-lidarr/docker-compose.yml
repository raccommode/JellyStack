version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jellystack-lidarr_server_1
      APP_PORT: 8686
      PROXY_AUTH_ADD: "true"

  server:
    image: lscr.io/linuxserver/lidarr:2.9.6
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}:/data
