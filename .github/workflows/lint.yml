name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install --user yamllint
      - name: Lint manifests
        run: |
          yamllint \
            -d '{extends: default, rules: {line-length: disable, document-start: disable, comments: {min-spaces-from-content: 1}, truthy: {check-keys: false}}}' \
            umbrel-app-store.yml \
            $(find . -name 'umbrel-app.yml' -not -path '*/node_modules/*')

  compose:
    name: Compose manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator deps
        run: pip install --user pyyaml
      - name: Validate every docker-compose.yml (Umbrel-aware)
        run: python3 scripts/validate-compose.py
      - name: Validate every umbrel-app.yml
        run: python3 scripts/validate-manifest.py

  panel:
    name: Panel (TypeScript + i18n)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jellystack-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: i18n key check
        run: pnpm i18n:check
      - name: TypeScript
        run: pnpm typecheck
      - name: ESLint
        run: pnpm lint
