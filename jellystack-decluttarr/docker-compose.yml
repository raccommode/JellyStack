version: "3.7"

services:
  server:
    image: ghcr.io/manimatter/decluttarr:v1.61.0
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TEST_RUN=False
      - LOG_LEVEL=INFO
      - REMOVE_TIMER=10
      - REMOVE_FAILED=True
      - REMOVE_FAILED_IMPORTS=True
      - REMOVE_METADATA_MISSING=True
      - REMOVE_MISSING_FILES=True
      - REMOVE_ORPHANS=True
      - REMOVE_SLOW=True
      - REMOVE_STALLED=True
      - REMOVE_UNMONITORED=True
      - RUN_PERIODIC_RESCANS={"SONARR":{"MIN_DAYS_BEFORE_RESCAN":7,"MAX_CONCURRENT_SCANS":3,"MAX_DAYS_STUCK":7}}
      - PERMITTED_ATTEMPTS=3
      - NO_STALLED_REMOVAL_QBIT_TAG=Don't Kill
      - MIN_DOWNLOAD_SPEED=100
