manifestVersion: 1.1
id: jellystack-decluttarr
category: automation
name: Decluttarr (JellyStack)
version: "v1.61.0"
tagline: Keep your *arr queues clean and download pipeline healthy.
description: >-
  Decluttarr watches your Sonarr, Radarr, Lidarr, and Readarr queues
  and removes downloads that are stalled, metadata-missing, failed, or
  stuck for too long. It then triggers a search for a replacement,
  keeping your automation pipeline flowing without manual babysitting.

  In the JellyStack ecosystem, Decluttarr is the janitor of your queues.
  It complements Unpackerr (which handles extraction) and the *arr apps
  (which handle imports) by making sure bad downloads don't clog the
  system indefinitely. Configurable thresholds let you decide how
  aggressive cleanup should be.

  Features include per-*arr app configuration, dry-run mode for safety,
  customizable removal criteria (stalled, no metadata, slow, failed
  imports), and integration with qBittorrent to remove private tracker
  torrents only when appropriate. Runs entirely in the background with
  no web UI.
releaseNotes: Initial JellyStack release.
