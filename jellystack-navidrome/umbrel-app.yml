id: jellystack-navidrome
category: media
name: Navidrome (JellyStack)
version: "0.54.5"
tagline: Modern music server, compatible with Subsonic and Airsonic clients.
description: >-
  Navidrome is a modern open-source music server and streamer that lets
  you enjoy your music collection from anywhere. It offers a beautiful
  web interface and full Subsonic API compatibility, working out of the
  box with dozens of mobile and desktop clients.

  In the JellyStack ecosystem, Navidrome is the music-focused complement
  to Jellyfin. While Jellyfin handles everything, Navidrome is purpose-built
  for music: faster library scans, better transcoding controls, richer
  metadata, smart playlists, and tight compatibility with the large
  Subsonic client ecosystem (DSub, Symfonium, Substreamer, play:Sub, etc.).

  Features include multi-user support with per-user favorites and
  playlists, smart playlists, last.fm and ListenBrainz scrobbling, on-the-fly
  transcoding, ReplayGain support, sharing, and a responsive web UI.
  Reads your existing music directory read-only and stores its own
  database separately.
releaseNotes: Initial JellyStack release.
