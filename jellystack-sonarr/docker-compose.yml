version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jellystack-sonarr_server_1
      APP_PORT: 8989
      PROXY_AUTH_ADD: "true"

  server:
    image: lscr.io/linuxserver/sonarr:4.0.15
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      # Shared JellyStack tree: Sonarr sees downloads AND media on the same
      # mount, which is what makes hard-link import work.
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}:/data
