version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jellystack-jellyfin_server_1
      APP_PORT: 8096
      PROXY_AUTH_ADD: "false"

  server:
    image: lscr.io/linuxserver/jellyfin:10.10.7
    restart: on-failure
    stop_grace_period: 1m
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - JELLYFIN_PublishedServerUrl=http://${DEVICE_HOSTNAME:-umbrel.local}:8096
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}/media:/data/media
      - ${APP_DATA_DIR}/data/transcode:/data/transcode
    devices:
      # Intel/AMD GPU passthrough for hardware transcoding (no-op if absent).
      - /dev/dri:/dev/dri
    ports:
      # Jellyfin DLNA + client auto-discovery on local network.
      - "7359:7359/udp"
      - "1900:1900/udp"
