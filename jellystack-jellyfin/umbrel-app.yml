manifestVersion: 1.1
id: jellystack-jellyfin
category: media
name: Jellyfin (JellyStack)
version: "10.10.7"
tagline: The Free Software Media System, pre-wired for JellyStack.
description: >-
  Jellyfin is the volunteer-built media solution that puts you in control of your media. Stream
  to any device from your own server, with no strings attached.


  This JellyStack build points the library at `/data/media` and the transcoding cache at
  `/data/transcode`, so it lines up with every other JellyStack app out of the box.


  🛠️ SETUP NOTES


  - Hardware transcoding: on Linux hosts with Intel/AMD GPUs, `/dev/dri` is passed through
    automatically. For NVIDIA, see `shared/docs/gpu-transcoding.md`.

  - The JellyStack Panel will pick up Jellyfin after install and wire Jellyseerr / Jellystat /
    Tautulli against it if those apps are installed.
releaseNotes: Initial JellyStack release.
developer: Jellyfin
website: https://jellyfin.org
dependencies: []
repo: https://github.com/jellyfin/jellyfin
support: https://forum.jellyfin.org
port: 8096
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - STORAGE_DOWNLOADS
  - STORAGE_MEDIA
submitter: raccommode
submission: https://github.com/raccommode/JellyStack
