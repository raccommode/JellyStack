version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jellystack-cross-seed_server_1
      APP_PORT: 2468
      PROXY_AUTH_ADD: "true"

  server:
    image: ghcr.io/cross-seed/cross-seed:6.13.0
    restart: on-failure
    stop_grace_period: 30s
    command: daemon
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - CONFIG_DIR=/config
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}/downloads/torrents:/torrents
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}:/data
