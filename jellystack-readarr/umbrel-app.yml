manifestVersion: 1.1
id: jellystack-readarr
category: media
name: Readarr (JellyStack)
version: "0.4.15"
tagline: Ebook and audiobook collection manager.
description: >-
  Readarr is an ebook and audiobook collection manager for Usenet and BitTorrent users. The
  upstream project is currently in maintenance mode — we ship the LinuxServer.io `develop` tag
  which tracks the latest community-patched releases.


  The JellyStack Panel pre-sets the root folders to `/data/media/books` and
  `/data/media/audiobooks`, and wires Readarr to Prowlarr + qBittorrent / SABnzbd on install.
releaseNotes: >-
  Initial JellyStack release. Readarr is on `develop` tag because the stable channel has not
  been updated by upstream — this is the LinuxServer.io consensus.
developer: Team Readarr
website: https://readarr.com
dependencies: []
repo: https://github.com/Readarr/Readarr
support: https://github.com/Readarr/Readarr/issues
port: 8787
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - STORAGE_DOWNLOADS
  - STORAGE_MEDIA
submitter: raccommode
submission: https://github.com/raccommode/JellyStack
