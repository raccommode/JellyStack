manifestVersion: 1.1
id: jellystack-radarr
category: media
name: Radarr (JellyStack)
version: "5.14.0"
tagline: Your movie collection manager for Usenet and BitTorrent.
description: >-
  Radarr is a movie collection manager for Usenet and BitTorrent users. It monitors multiple RSS
  feeds for new movies and will grab, sort and rename them.


  The JellyStack Panel auto-wires Radarr with Prowlarr + qBittorrent / SABnzbd on install. The
  root folder is pre-set to `/data/media/movies` and the download category to `movies`.
releaseNotes: Initial JellyStack release.
developer: Team Radarr
website: https://radarr.video
dependencies: []
repo: https://github.com/Radarr/Radarr
support: https://radarr.video/#forms
port: 7878
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - STORAGE_DOWNLOADS
  - STORAGE_MEDIA
submitter: raccommode
submission: https://github.com/raccommode/JellyStack
