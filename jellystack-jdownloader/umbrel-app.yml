manifestVersion: 1.1
id: jellystack-jdownloader
category: networking
name: JDownloader 2 (JellyStack)
version: "v25.10.1"
tagline: Automated direct download manager for one-click hosters.
description: >-
  JDownloader 2 is a powerful, open-source download management tool with
  a huge community of developers that makes downloading files from
  one-click hosters (filesharing sites), file mirror networks, and
  direct download links as simple and automated as possible.

  In the JellyStack ecosystem, JDownloader complements the torrent and
  Usenet clients by handling direct downloads from file hosting services.
  Completed downloads land in the shared JellyStack downloads directory
  where they can be picked up by your *arr applications, extracted by
  Unpackerr, and imported into your Jellyfin media library.

  Key features include link parsing and decryption, automatic captcha
  recognition, resume support, bandwidth throttling, archive extraction,
  premium account support for most major hosters, and a web-based
  interface via noVNC. Supports thousands of hosters and regularly
  updated plugins.
releaseNotes: Initial JellyStack release.
developer: JDownloader Community
website: https://jdownloader.org
dependencies: []
repo: https://github.com/jlesage/docker-jdownloader-2
support: https://github.com/raccommode/JellyStack/issues
port: 5800
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - STORAGE_DOWNLOADS
submitter: raccommode
submission: https://github.com/raccommode/JellyStack
