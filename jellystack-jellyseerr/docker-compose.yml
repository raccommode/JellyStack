version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jellystack-jellyseerr_server_1
      APP_PORT: 5055
      PROXY_AUTH_ADD: "false"

  server:
    image: fallenbagel/jellyseerr:2.5.2
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-UTC}
      - PORT=5055
    volumes:
      - ${APP_DATA_DIR}/data/config:/app/config
