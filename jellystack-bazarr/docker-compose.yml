version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jellystack-bazarr_server_1
      APP_PORT: 6767
      PROXY_AUTH_ADD: "true"

  server:
    image: lscr.io/linuxserver/bazarr:1.5.2
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}/media:/data/media
