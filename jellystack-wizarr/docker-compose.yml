version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jellystack-wizarr_server_1
      APP_PORT: 5690
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/wizarrrr/wizarr:4.2.0
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR}/data/database:/data/database
