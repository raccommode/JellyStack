manifestVersion: 1.1
id: jellystack-wizarr
category: media
name: Wizarr (JellyStack)
version: "4.2.0"
tagline: Automatic user invitation system for Jellyfin.
description: >-
  Wizarr is a beautiful user invitation system for Jellyfin (and Plex,
  Emby). It generates invitation links that guide new users through
  account creation, library selection, and even setting up client apps,
  removing all the friction of onboarding friends and family.

  Within the JellyStack ecosystem, Wizarr is the front door for new
  users. Instead of manually creating Jellyfin accounts and messaging
  people with credentials and setup instructions, just send them an
  invite link. Wizarr handles the rest, including guiding them through
  installing a client and signing in.

  Features include customizable invite pages, duration-limited invites,
  user limits per invite, automatic library permission assignment,
  multi-step onboarding wizard, and integration with Discord / Overseerr /
  Jellyseerr. A huge quality-of-life upgrade for anyone sharing their
  media server.
releaseNotes: Initial JellyStack release.
developer: Wizarr Contributors
website: https://wizarr.dev
dependencies:
  - jellystack-jellyfin
repo: https://github.com/Wizarrrr/wizarr
support: https://github.com/raccommode/JellyStack/issues
port: 5690
