version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jellystack-kapowarr_server_1
      APP_PORT: 5656
      PROXY_AUTH_ADD: "true"

  server:
    image: mrcas/kapowarr:v1.1.0
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR}/data/config:/app/db
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}/media/comics:/comics-1
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}/downloads:/downloads
