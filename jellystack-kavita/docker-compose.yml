version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jellystack-kavita_server_1
      APP_PORT: 5000
      PROXY_AUTH_ADD: "false"

  server:
    image: jvmilazz0/kavita:0.8.6
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR}/data/config:/kavita/config
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}/media/books:/books
      - ${JELLYSTACK_ROOT:-${UMBREL_ROOT}/JellyStack}/media/comics:/comics
