manifestVersion: 1.1
id: jellystack-kavita
category: media
name: Kavita (JellyStack)
version: "0.8.6"
tagline: Fast, feature-rich reading server for your digital library.
description: >-
  Kavita is a fast, feature-rich, cross-platform reading server. Built
  for bibliophiles and the power users alike, Kavita stands up next to
  commercial offerings in terms of features and performance, while being
  fully self-hosted and free.

  In the JellyStack ecosystem, Kavita is the dedicated reading front-end
  for your books, comics, manga, and magazines. It offers a much better
  reading experience than generic media servers for printed content,
  with specialized readers for each format, series tracking, and rich
  metadata. Pair it with Readarr and Kapowarr to automate acquisition.

  Features include beautiful web readers for PDF, EPUB, CBZ, CBR, and
  image-based comics; full-text search; reading progress sync across
  devices; user and library management; OPDS support for external
  readers; and a powerful metadata and collection system. OPDS + API
  enable integration with third-party reader apps.
releaseNotes: Initial JellyStack release.
developer: Kavita Team
website: https://www.kavitareader.com
dependencies: []
repo: https://github.com/Kareadita/Kavita
support: https://github.com/raccommode/JellyStack/issues
port: 5000
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - STORAGE_MEDIA
submitter: raccommode
submission: https://github.com/raccommode/JellyStack
