manifestVersion: 1.1
id: jellystack-watchtower
category: utilities
name: Watchtower (JellyStack)
version: "1.7.1"
tagline: Automated Docker container image updates.
description: >-
  Watchtower is a process for automating Docker container base image
  updates. It periodically checks for newer versions of the images
  backing your running containers, pulls updates, and gracefully
  restarts containers to use the new images, keeping your stack current
  without manual intervention.

  In the JellyStack ecosystem, Watchtower is entirely optional and
  intended for users who want unattended updates outside Umbrel's
  normal update flow. Use it carefully: automatic updates can
  occasionally break compatibility between Sonarr, Radarr, Prowlarr,
  and other *arr apps, so many users prefer a notify-only configuration.

  Features include configurable polling intervals, selective monitoring
  via labels, notifications via email / Slack / Gotify / Discord,
  rolling restarts with minimum downtime, optional auto-removal of old
  images, and a monitor-only mode that reports available updates
  without applying them. Runs entirely headless with no web UI.
releaseNotes: Initial JellyStack release.
