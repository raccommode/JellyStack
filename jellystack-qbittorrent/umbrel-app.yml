manifestVersion: 1.1
id: jellystack-qbittorrent
category: networking
name: qBittorrent (JellyStack)
version: "5.0.3"
tagline: Free and reliable P2P BitTorrent client, wired for the *arr suite.
description: >-
  qBittorrent is an open-source BitTorrent client that aims to meet the needs of most users
  while using as little CPU and memory as possible.


  🛠️ SETUP NOTES


  - Downloads are saved under `/data/downloads/torrents/*` (categorized by the *arr apps).

  - The JellyStack Panel pre-creates `movies`, `tv`, `music`, `books` categories and wires
    this qBittorrent as the default download client on each installed *arr app.

  - If you also install `jellystack-gluetun`, route qBittorrent through the VPN by editing
    the compose override — see `shared/docs/gluetun-setup.md`.


  ⚠️ Default WebUI credentials are `admin` / `adminadmin`. Change them from Settings → WebUI
  on first login, or use the JellyStack Panel's Settings page to rotate them.
releaseNotes: Initial JellyStack release.
developer: qBittorrent
website: https://qbittorrent.org
dependencies: []
repo: https://github.com/qbittorrent/qBittorrent
support: https://github.com/qbittorrent/qBittorrent/issues
port: 8080
gallery: []
path: ""
defaultUsername: "admin"
defaultPassword: "adminadmin"
torOnly: false
permissions:
  - STORAGE_DOWNLOADS
submitter: raccommode
submission: https://github.com/raccommode/JellyStack
